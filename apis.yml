name: Amazon Bedrock API
description: >-
  Amazon Bedrock is a fully managed service that makes high-performing
  foundation models (FMs) from leading AI companies available through a
  unified API. It enables developers to build and scale generative AI
  applications using foundation models for text generation, summarization,
  image generation, and conversational AI without managing infrastructure.
  Bedrock supports model customization, fine-tuning, and retrieval-augmented
  generation (RAG) to tailor models to specific use cases.
url: https://aws.amazon.com/bedrock/

apis:

  - name: Amazon Bedrock API
    description: >-
      The Amazon Bedrock management API provides operations for managing
      foundation models, custom models, model customization jobs, provisioned
      throughput, guardrails, and other Bedrock resources. Use this API to
      list available models, create fine-tuning jobs, manage provisioned
      capacity, and configure Bedrock features.
    baseURL: https://bedrock.amazonaws.com
    properties:
      - type: Documentation
        url: https://docs.aws.amazon.com/bedrock/latest/APIReference/
      - type: OpenAPI
        url: openapi/amazon-bedrock-openapi.yml
      - type: JSONSchema
        url: json-schema/amazon-bedrock-model-schema.json
      - type: JSONLD
        url: json-ld/amazon-bedrock-context.jsonld
      - type: Pricing
        url: https://aws.amazon.com/bedrock/pricing/
      - type: Getting Started
        url: https://docs.aws.amazon.com/bedrock/latest/userguide/getting-started.html
      - type: FAQ
        url: https://aws.amazon.com/bedrock/faqs/
      - type: User Guide
        url: https://docs.aws.amazon.com/bedrock/latest/userguide/
      - type: API Reference
        url: https://docs.aws.amazon.com/bedrock/latest/APIReference/
      - type: CLI Reference
        url: https://docs.aws.amazon.com/cli/latest/reference/bedrock/
      - type: Security
        url: https://docs.aws.amazon.com/bedrock/latest/userguide/security.html

  - name: Amazon Bedrock Runtime API
    description: >-
      The Amazon Bedrock Runtime API provides operations for invoking
      foundation models and running inference. Use this API to send prompts
      to models, receive generated responses, conduct multi-turn
      conversations with the Converse API, and stream responses in real
      time for low-latency applications.
    baseURL: https://bedrock-runtime.amazonaws.com
    properties:
      - type: Documentation
        url: https://docs.aws.amazon.com/bedrock/latest/APIReference/
      - type: OpenAPI
        url: openapi/amazon-bedrock-runtime-openapi.yml
      - type: JSONSchema
        url: json-schema/amazon-bedrock-model-schema.json
      - type: JSONLD
        url: json-ld/amazon-bedrock-context.jsonld
      - type: Pricing
        url: https://aws.amazon.com/bedrock/pricing/
      - type: Getting Started
        url: https://docs.aws.amazon.com/bedrock/latest/userguide/getting-started.html
      - type: FAQ
        url: https://aws.amazon.com/bedrock/faqs/
      - type: User Guide
        url: https://docs.aws.amazon.com/bedrock/latest/userguide/
      - type: API Reference
        url: https://docs.aws.amazon.com/bedrock/latest/APIReference/
      - type: CLI Reference
        url: https://docs.aws.amazon.com/cli/latest/reference/bedrock-runtime/
      - type: Security
        url: https://docs.aws.amazon.com/bedrock/latest/userguide/security.html

